name: Angular CI & Deploy to GitHub Pages

on:
  push:
    branches: [ testing ]
  pull_request:
    branches: [ testing ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 🧹 Remove macOS-only package from package.json and lockfile
        run: |
          jq 'del(.dependencies["@rollup/rollup-darwin-arm64"])' package.json > temp.json && mv temp.json package.json
          sed -i '/"@rollup\/rollup-darwin-arm64"/,+5d' package-lock.json

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: ➕ Install missing peer dependencies
        run: npm install filepond flatpickr overlayscrollbars --save

      - name: ❌ Skip lint & tests
        run: echo "Skipping lint and unit tests"

      - name: 🏗️ Build Angular App
        run: npm run build -- --configuration=production

      - name: 📁 Verify preview directory exists and has files
        run: |
          if [ ! -d "preview" ] || [ -z "$(ls -A preview)" ]; then
            echo "❌ Build failed: preview directory is missing or empty"
            exit 1
          else
            echo "✅ preview directory is ready"
            ls -la preview
          fi

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: preview
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false

