name: Angular CI & Deploy to GitHub Pages

on:
  push:
    branches: [ testing ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 🧹 Remove macOS-only package
        run: |
          jq 'del(.dependencies["@rollup/rollup-darwin-arm64"])' package.json > temp.json && mv temp.json package.json || true
          sed -i '/"@rollup\/rollup-darwin-arm64"/,+5d' package-lock.json || true

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: ❌ Skip tests and lint
        run: echo "Skipping tests and lint"

      - name: 🏗️ Build Angular App
        run: npm run build -- --configuration=production

      - name: 🧪 Debug — check build output
        run: ls -al preview

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: preview
          publish_branch: gh-pages
          enable_jekyll: false

